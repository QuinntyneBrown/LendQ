openapi: 3.1.0
info:
  title: LendQ API
  version: 1.0.0
  description: >
    Versioned public API contract for the LendQ lending application.
    This contract is the source of truth for frontend and integration design.
servers:
  - url: https://api.lendq.example.com
    description: Production
  - url: https://staging-api.lendq.example.com
    description: Staging
tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Loans
  - name: Payments
  - name: Dashboard
  - name: Notifications
  - name: Settings
  - name: Health
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Version conflict or domain conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    UserSummary:
      type: object
      required: [id, name, email, roles, status, email_verified]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [ADMIN, CREDITOR, BORROWER]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        email_verified:
          type: boolean
    SessionSummary:
      type: object
      required: [id, created_at, last_seen_at, is_current, user_agent]
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        is_current:
          type: boolean
        user_agent:
          type: string
        ip_address:
          type: string
        location_hint:
          type: string
    AuthTokenBundle:
      type: object
      required: [access_token, expires_in_seconds, user]
      properties:
        access_token:
          type: string
        expires_in_seconds:
          type: integer
        user:
          $ref: "#/components/schemas/UserSummary"
    Role:
      type: object
      required: [key, label, permissions]
      properties:
        key:
          type: string
          enum: [ADMIN, CREDITOR, BORROWER]
        label:
          type: string
        permissions:
          type: array
          items:
            type: string
    BorrowerDirectoryItem:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    CustomScheduleRow:
      type: object
      required: [due_date, amount_due]
      properties:
        due_date:
          type: string
          format: date
        amount_due:
          type: string
    LoanInput:
      type: object
      required:
        - borrower_id
        - description
        - principal_amount
        - currency
        - repayment_frequency
        - start_date
      properties:
        borrower_id:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 500
        principal_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY, CUSTOM]
        installment_count:
          type: integer
          minimum: 1
        maturity_date:
          type: string
          format: date
        start_date:
          type: string
          format: date
        notes:
          type: string
        custom_schedule:
          type: array
          items:
            $ref: "#/components/schemas/CustomScheduleRow"
    LoanSummary:
      type: object
      required: [id, description, counterparty_name, principal_amount, outstanding_balance, next_due_date, status]
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        counterparty_name:
          type: string
        principal_amount:
          type: string
        outstanding_balance:
          type: string
        next_due_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [ACTIVE, PAUSED, PAID_OFF, OVERDUE, DEFAULTED]
    LoanTermsVersion:
      type: object
      required: [version, effective_at, reason]
      properties:
        version:
          type: integer
        effective_at:
          type: string
          format: date-time
        reason:
          type: string
        principal_amount:
          type: string
        currency:
          type: string
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
        installment_count:
          type: integer
          nullable: true
        maturity_date:
          type: string
          format: date
          nullable: true
    ScheduleInstallment:
      type: object
      required: [id, sequence, due_date, amount_due, amount_paid, status]
      properties:
        id:
          type: string
          format: uuid
        sequence:
          type: integer
        due_date:
          type: string
          format: date
        amount_due:
          type: string
        amount_paid:
          type: string
        status:
          type: string
          enum: [SCHEDULED, PARTIAL, PAID, PAUSED, RESCHEDULED, OVERDUE]
        original_due_date:
          type: string
          format: date
          nullable: true
    ScheduleVersion:
      type: object
      required: [version, effective_at, installments]
      properties:
        version:
          type: integer
        effective_at:
          type: string
          format: date-time
        installments:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleInstallment"
    LoanDetail:
      allOf:
        - $ref: "#/components/schemas/LoanSummary"
        - type: object
          required:
            - borrower
            - creditor
            - current_terms_version
            - current_schedule_version
          properties:
            borrower:
              $ref: "#/components/schemas/UserSummary"
            creditor:
              $ref: "#/components/schemas/UserSummary"
            current_terms_version:
              $ref: "#/components/schemas/LoanTermsVersion"
            current_schedule_version:
              $ref: "#/components/schemas/ScheduleVersion"
    LoanChangeRequest:
      type: object
      required: [id, type, status, requested_by, created_at, reason]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [TERM_CHANGE, RESCHEDULE, PAUSE]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        requested_by:
          $ref: "#/components/schemas/UserSummary"
        created_at:
          type: string
          format: date-time
        reason:
          type: string
        proposed_terms:
          type: object
          additionalProperties: true
    PaymentAllocation:
      type: object
      required: [installment_id, amount]
      properties:
        installment_id:
          type: string
          format: uuid
        amount:
          type: string
    PaymentTransaction:
      type: object
      required: [id, loan_id, amount, posted_at, payment_method, direction, transaction_type]
      properties:
        id:
          type: string
          format: uuid
        loan_id:
          type: string
          format: uuid
        amount:
          type: string
        posted_at:
          type: string
          format: date-time
        payment_method:
          type: string
          enum: [CASH, BANK_TRANSFER, CARD, OTHER]
        direction:
          type: string
          enum: [CREDIT, DEBIT]
        transaction_type:
          type: string
          enum: [PAYMENT, REVERSAL, ADJUSTMENT]
        notes:
          type: string
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/PaymentAllocation"
    RecordPaymentRequest:
      type: object
      required: [amount, posted_at, payment_method]
      properties:
        amount:
          type: string
        posted_at:
          type: string
          format: date-time
        payment_method:
          type: string
          enum: [CASH, BANK_TRANSFER, CARD, OTHER]
        notes:
          type: string
    ReversalRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
    ScheduleAdjustmentRequest:
      type: object
      required: [installment_ids, reason]
      properties:
        installment_ids:
          type: array
          items:
            type: string
            format: uuid
        new_due_date:
          type: string
          format: date
        reason:
          type: string
        requested_mode:
          type: string
          enum: [DIRECT_APPLY, REQUEST_APPROVAL]
    DashboardSummary:
      type: object
      required: [total_lent_out, total_owed, upcoming_payments_7d, overdue_payments, generated_at]
      properties:
        total_lent_out:
          type: string
        total_owed:
          type: string
        upcoming_payments_7d:
          type: integer
        overdue_payments:
          type: integer
        generated_at:
          type: string
          format: date-time
        projection_lag_seconds:
          type: integer
    ActivityItem:
      type: object
      required: [id, type, description, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        loan_id:
          type: string
          format: uuid
          nullable: true
    Notification:
      type: object
      required: [id, type, title, body, is_read, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [PAYMENT_DUE, PAYMENT_OVERDUE, PAYMENT_RECEIVED, SCHEDULE_CHANGED, LOAN_MODIFIED, SYSTEM]
        title:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
        related_loan_id:
          type: string
          format: uuid
          nullable: true
    NotificationPreferences:
      type: object
      required:
        - payment_due_email
        - payment_overdue_email
        - payment_received_email
        - schedule_changed_email
        - loan_modified_email
        - system_email
      properties:
        payment_due_email:
          type: boolean
        payment_overdue_email:
          type: boolean
        payment_received_email:
          type: boolean
        schedule_changed_email:
          type: boolean
        loan_modified_email:
          type: boolean
        system_email:
          type: boolean
paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create an account and send verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirm_password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                confirm_password:
                  type: string
      responses:
        "201":
          description: Account created
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Login and establish a refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/email-verification/resend:
    post:
      tags: [Auth]
      summary: Resend a verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Request accepted
  /api/v1/auth/email-verification/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Generic success response
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete a password reset and revoke existing sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirm_password]
              properties:
                token:
                  type: string
                password:
                  type: string
                confirm_password:
                  type: string
      responses:
        "200":
          description: Password updated
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Rotate refresh session and issue a new access token
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Get the authenticated user profile
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke the current session
      responses:
        "204":
          description: Logged out
  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke all other sessions for the authenticated user
      responses:
        "204":
          description: Other sessions revoked
  /api/v1/auth/sessions:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: List active sessions for the authenticated user
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
  /api/v1/auth/sessions/{sessionId}:
    delete:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke a specific session
      responses:
        "204":
          description: Session revoked
  /api/v1/users:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: List users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Create a user
      responses:
        "201":
          description: Created
  /api/v1/users/borrowers:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Search the creditor-safe borrower directory
      responses:
        "200":
          description: Matching borrowers
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/BorrowerDirectoryItem"
  /api/v1/users/{userId}:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Get a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
    patch:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Update a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated
  /api/v1/roles:
    get:
      tags: [Roles]
      security:
        - bearerAuth: []
      summary: List roles and permissions
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
  /api/v1/roles/{roleKey}/permissions:
    put:
      tags: [Roles]
      security:
        - bearerAuth: []
      summary: Replace permissions for a role using the controlled catalog
      parameters:
        - in: path
          name: roleKey
          required: true
          schema:
            type: string
            enum: [ADMIN, CREDITOR, BORROWER]
      responses:
        "200":
          description: Updated
  /api/v1/admin/audit-events:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Search administrative audit events
      responses:
        "200":
          description: Audit events
  /api/v1/loans:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List loans
      responses:
        "200":
          description: Loan list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LoanSummary"
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Create a loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Loan created
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/loans/{loanId}:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Get loan detail
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanDetail"
    patch:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Update creditor-controlled loan terms
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/LoanInput"
                - type: object
                  required: [expected_terms_version]
                  properties:
                    expected_terms_version:
                      type: integer
      responses:
        "200":
          description: Loan updated
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/{loanId}/terms-versions:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List loan-term versions
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Terms versions
  /api/v1/loans/{loanId}/change-requests:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List change requests for a loan
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Change requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LoanChangeRequest"
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Create a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Created
  /api/v1/loans/{loanId}/change-requests/{requestId}/approve:
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Approve a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approved
  /api/v1/loans/{loanId}/change-requests/{requestId}/reject:
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Reject a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rejected
  /api/v1/loans/{loanId}/schedule:
    get:
      tags: [Payments]
      security:
        - bearerAuth: []
      summary: Get current loan schedule
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleVersion"
  /api/v1/loans/{loanId}/payments:
    get:
      tags: [Payments]
      security:
        - bearerAuth: []
      summary: List payment transactions for a loan
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment transactions
    post:
      tags: [Payments]
      security:
        - bearerAuth: []
      summary: Record an immutable payment transaction
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentRequest"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentTransaction"
        "409":
          $ref: "#/components/responses/Conflict"
