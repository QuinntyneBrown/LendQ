        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Generated loan history
          content:
            application/json:
              schema:
                type: object
                required: [items, meta]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedLoanRecord"
                  meta:
                    $ref: "#/components/schemas/CursorPageMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/loans/{loanId}:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Get loan detail
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Loan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanDetail"
    patch:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Update creditor-controlled loan terms
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/LoanInput"
                - type: object
                  required: [expected_terms_version]
                  properties:
                    expected_terms_version:
                      type: integer
      responses:
        "200":
          description: Loan updated
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/{loanId}/terms-versions:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List loan-term versions
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Terms versions
  /api/v1/loans/{loanId}/change-requests:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List change requests for a loan
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Change requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LoanChangeRequest"
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Create a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Created
  /api/v1/loans/{loanId}/change-requests/{requestId}/approve:
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Approve a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approved
  /api/v1/loans/{loanId}/change-requests/{requestId}/reject:
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Reject a change request
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: requestId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rejected
  /api/v1/loans/{loanId}/schedule:
    get:
      tags: [Payments]
      security:
        - bearerAuth: []
      summary: Get current loan schedule
      parameters:
        - in: path
          name: loanId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleVersion"
  /api/v1/loans/{loanId}/payments:
