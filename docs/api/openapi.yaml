openapi: 3.1.0
info:
  title: LendQ API
  version: 1.1.0
  description: >
    Versioned public API contract for the LendQ lending application.
    This contract is the source of truth for frontend and integration design.
servers:
  - url: https://api.lendq.example.com
    description: Production
  - url: https://staging-api.lendq.example.com
    description: Staging
tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Loans
  - name: Recurring Loans
  - name: Bank Accounts
  - name: Savings
  - name: Payments
  - name: Dashboard
  - name: Notifications
  - name: Settings
  - name: Health
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    AccountIdParam:
      in: path
      name: accountId
      required: true
      schema:
        type: string
        format: uuid
    TransactionIdParam:
      in: path
      name: transactionId
      required: true
      schema:
        type: string
        format: uuid
    RecurringDepositIdParam:
      in: path
      name: depositId
      required: true
      schema:
        type: string
        format: uuid
    GoalIdParam:
      in: path
      name: goalId
      required: true
      schema:
        type: string
        format: uuid
    RecurringLoanIdParam:
      in: path
      name: recurringId
      required: true
      schema:
        type: string
        format: uuid
    CursorParam:
      in: query
      name: cursor
      required: false
      schema:
        type: string
    LimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  responses:
    Unauthorized:
      description: Authentication required or session invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorized for the requested operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource not found in the caller's authorized scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Version conflict or domain conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    UserSummary:
      type: object
      required: [id, name, email, roles, status, email_verified]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [ADMIN, CREDITOR, BORROWER]
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        email_verified:
          type: boolean
    SessionSummary:
      type: object
      required: [id, created_at, last_seen_at, is_current, user_agent]
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        is_current:
          type: boolean
        user_agent:
          type: string
        ip_address:
          type: string
        location_hint:
          type: string
    AuthTokenBundle:
      type: object
      required: [access_token, expires_in_seconds, user]
      properties:
        access_token:
          type: string
        expires_in_seconds:
          type: integer
        user:
          $ref: "#/components/schemas/UserSummary"
    Role:
      type: object
      required: [key, label, permissions]
      properties:
        key:
          type: string
          enum: [ADMIN, CREDITOR, BORROWER]
        label:
          type: string
        permissions:
          type: array
          items:
            type: string
    BorrowerDirectoryItem:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    CustomScheduleRow:
      type: object
      required: [due_date, amount_due]
      properties:
        due_date:
          type: string
          format: date
        amount_due:
          type: string
    LoanInput:
      type: object
      required:
        - borrower_id
        - description
        - principal_amount
        - currency
        - repayment_frequency
        - start_date
      properties:
        borrower_id:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 500
        principal_amount:
          type: string
          pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY, CUSTOM]
        installment_count:
          type: integer
          minimum: 1
        maturity_date:
          type: string
          format: date
        start_date:
          type: string
          format: date
        notes:
          type: string
        custom_schedule:
          type: array
          items:
            $ref: "#/components/schemas/CustomScheduleRow"
    LoanSummary:
      type: object
      required: [id, description, counterparty_name, principal_amount, outstanding_balance, next_due_date, status]
      properties:
        id:
          type: string
          format: uuid
        description:
          type: string
        counterparty_name:
          type: string
        principal_amount:
          type: string
        outstanding_balance:
          type: string
        next_due_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [ACTIVE, PAUSED, PAID_OFF, OVERDUE, DEFAULTED]
    LoanTermsVersion:
      type: object
      required: [version, effective_at, reason]
      properties:
        version:
          type: integer
        effective_at:
          type: string
          format: date-time
        reason:
          type: string
        principal_amount:
          type: string
        currency:
          type: string
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
        installment_count:
          type: integer
          nullable: true
        maturity_date:
          type: string
          format: date
          nullable: true
    ScheduleInstallment:
      type: object
      required: [id, sequence, due_date, amount_due, amount_paid, status]
      properties:
        id:
          type: string
          format: uuid
        sequence:
          type: integer
        due_date:
          type: string
          format: date
        amount_due:
          type: string
        amount_paid:
          type: string
        status:
          type: string
          enum: [SCHEDULED, PARTIAL, PAID, PAUSED, RESCHEDULED, OVERDUE]
        original_due_date:
          type: string
          format: date
          nullable: true
    ScheduleVersion:
      type: object
      required: [version, effective_at, installments]
      properties:
        version:
          type: integer
        effective_at:
          type: string
          format: date-time
        installments:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleInstallment"
    LoanDetail:
      allOf:
        - $ref: "#/components/schemas/LoanSummary"
        - type: object
          required:
            - borrower
            - creditor
            - current_terms_version
            - current_schedule_version
          properties:
            borrower:
              $ref: "#/components/schemas/UserSummary"
            creditor:
              $ref: "#/components/schemas/UserSummary"
            current_terms_version:
              $ref: "#/components/schemas/LoanTermsVersion"
            current_schedule_version:
              $ref: "#/components/schemas/ScheduleVersion"
    LoanChangeRequest:
      type: object
      required: [id, type, status, requested_by, created_at, reason]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [TERM_CHANGE, RESCHEDULE, PAUSE]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        requested_by:
          $ref: "#/components/schemas/UserSummary"
        created_at:
          type: string
          format: date-time
        reason:
          type: string
        proposed_terms:
          type: object
          additionalProperties: true
    PaymentAllocation:
      type: object
      required: [installment_id, amount]
      properties:
        installment_id:
          type: string
          format: uuid
        amount:
          type: string
    PaymentTransaction:
      type: object
      required: [id, loan_id, amount, posted_at, payment_method, direction, transaction_type]
      properties:
        id:
          type: string
          format: uuid
        loan_id:
          type: string
          format: uuid
        amount:
          type: string
        posted_at:
          type: string
          format: date-time
        payment_method:
          type: string
          enum: [CASH, BANK_TRANSFER, CARD, OTHER]
        direction:
          type: string
          enum: [CREDIT, DEBIT]
        transaction_type:
          type: string
          enum: [PAYMENT, REVERSAL, ADJUSTMENT]
        notes:
          type: string
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/PaymentAllocation"
    RecordPaymentRequest:
      type: object
      required: [amount, posted_at, payment_method]
      properties:
        amount:
          type: string
        posted_at:
          type: string
          format: date-time
        payment_method:
          type: string
          enum: [CASH, BANK_TRANSFER, CARD, OTHER]
        notes:
          type: string
    ReversalRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
    ScheduleAdjustmentRequest:
      type: object
      required: [installment_ids, reason]
      properties:
        installment_ids:
          type: array
          items:
            type: string
            format: uuid
        new_due_date:
          type: string
          format: date
        reason:
          type: string
        requested_mode:
          type: string
          enum: [DIRECT_APPLY, REQUEST_APPROVAL]
    DashboardSummary:
      type: object
      required: [total_lent_out, total_owed, upcoming_payments_7d, overdue_payments, generated_at]
      properties:
        total_lent_out:
          type: string
        total_owed:
          type: string
        upcoming_payments_7d:
          type: integer
        overdue_payments:
          type: integer
        generated_at:
          type: string
          format: date-time
        projection_lag_seconds:
          type: integer
    ActivityItem:
      type: object
      required: [id, type, description, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        loan_id:
          type: string
          format: uuid
          nullable: true
    Notification:
      type: object
      required: [id, type, title, body, is_read, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [PAYMENT_DUE, PAYMENT_OVERDUE, PAYMENT_RECEIVED, SCHEDULE_CHANGED, LOAN_MODIFIED, SYSTEM]
        title:
          type: string
        body:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
        related_loan_id:
          type: string
          format: uuid
          nullable: true
    NotificationPreferences:
      type: object
      required:
        - payment_due_email
        - payment_overdue_email
        - payment_received_email
        - schedule_changed_email
        - loan_modified_email
        - system_email
      properties:
        payment_due_email:
          type: boolean
        payment_overdue_email:
          type: boolean
        payment_received_email:
          type: boolean
        schedule_changed_email:
          type: boolean
        loan_modified_email:
          type: boolean
        system_email:
          type: boolean
    MoneyAmount:
      type: string
      pattern: "^[0-9]+(\\.[0-9]{1,2})?$"
    CursorPageMeta:
      type: object
      required: [next_cursor]
      properties:
        next_cursor:
          type: string
          nullable: true
    BankAccountSummary:
      type: object
      required: [id, owner, currency, current_balance, available_balance, status, timezone, version]
      properties:
        id:
          type: string
          format: uuid
        owner:
          $ref: "#/components/schemas/UserSummary"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        current_balance:
          $ref: "#/components/schemas/MoneyAmount"
        available_balance:
          $ref: "#/components/schemas/MoneyAmount"
        status:
          type: string
          enum: [ACTIVE, FROZEN, CLOSED]
        timezone:
          type: string
        version:
          type: integer
        last_transaction_at:
          type: string
          format: date-time
          nullable: true
    BankAccountDetail:
      allOf:
        - $ref: "#/components/schemas/BankAccountSummary"
        - type: object
          required: [created_at]
          properties:
            created_at:
              type: string
              format: date-time
    BankTransaction:
      type: object
      required:
        - id
        - account_id
        - direction
        - entry_type
        - amount
        - currency
        - balance_before
        - balance_after
        - created_at
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [CREDIT, DEBIT]
        entry_type:
          type: string
          enum: [MANUAL_DEPOSIT, MANUAL_WITHDRAWAL, RECURRING_DEPOSIT, REVERSAL]
        amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        balance_before:
          $ref: "#/components/schemas/MoneyAmount"
        balance_after:
          $ref: "#/components/schemas/MoneyAmount"
        reason_code:
          type: string
        description:
          type: string
          nullable: true
        correlation_id:
          type: string
        reversed_transaction_id:
          type: string
          format: uuid
          nullable: true
        initiated_by:
          $ref: "#/components/schemas/UserSummary"
        created_at:
          type: string
          format: date-time
    BankAccountPostingResult:
      type: object
      required: [account, transaction]
      properties:
        account:
          $ref: "#/components/schemas/BankAccountDetail"
        transaction:
          $ref: "#/components/schemas/BankTransaction"
    ManualAccountAdjustmentRequest:
      type: object
      required: [amount, reason_code, description]
      properties:
        amount:
          $ref: "#/components/schemas/MoneyAmount"
        reason_code:
          type: string
          minLength: 2
          maxLength: 64
        description:
          type: string
          minLength: 3
          maxLength: 500
        support_reference:
          type: string
          maxLength: 100
    BankTransactionReversalRequest:
      type: object
      required: [reason_code, reason]
      properties:
        reason_code:
          type: string
          minLength: 2
          maxLength: 64
        reason:
          type: string
          minLength: 3
          maxLength: 500
        support_reference:
          type: string
          maxLength: 100
    RecurringDepositInput:
      type: object
      required: [amount, frequency, start_date, execution_time_local, timezone]
      properties:
        amount:
          $ref: "#/components/schemas/MoneyAmount"
        source_description:
          type: string
          maxLength: 200
        frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        execution_time_local:
          type: string
          pattern: "^\\d{2}:\\d{2}(:\\d{2})?$"
        timezone:
          type: string
    RecurringDeposit:
      allOf:
        - $ref: "#/components/schemas/RecurringDepositInput"
        - type: object
          required: [id, account_id, status, next_execution_at, version, created_at]
          properties:
            id:
              type: string
              format: uuid
            account_id:
              type: string
              format: uuid
            status:
              type: string
              enum: [ACTIVE, PAUSED, FAILED, COMPLETED, CANCELLED]
            next_execution_at:
              type: string
              format: date-time
              nullable: true
            last_failure_code:
              type: string
              nullable: true
            version:
              type: integer
            created_at:
              type: string
              format: date-time
    RecurringDepositUpdateRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version:
          type: integer
        amount:
          $ref: "#/components/schemas/MoneyAmount"
        source_description:
          type: string
          maxLength: 200
        frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        execution_time_local:
          type: string
          pattern: "^\\d{2}:\\d{2}(:\\d{2})?$"
        timezone:
          type: string
    SavingsGoalSummary:
      type: object
      required: [id, name, target_amount, current_amount, currency, status, progress_percent, version]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        target_amount:
          $ref: "#/components/schemas/MoneyAmount"
        current_amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        deadline:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETED, CANCELLED]
        progress_percent:
          type: number
          format: float
        version:
          type: integer
    SavingsGoalDetail:
      allOf:
        - $ref: "#/components/schemas/SavingsGoalSummary"
        - type: object
          required: [created_at]
          properties:
            created_at:
              type: string
              format: date-time
    SavingsGoalEntry:
      type: object
      required: [id, goal_id, direction, entry_type, amount, currency, running_total, created_at]
      properties:
        id:
          type: string
          format: uuid
        goal_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [CREDIT, DEBIT]
        entry_type:
          type: string
          enum: [CONTRIBUTION, RELEASE, ADJUSTMENT]
        amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        bank_transaction_id:
          type: string
          format: uuid
          nullable: true
        running_total:
          $ref: "#/components/schemas/MoneyAmount"
        created_at:
          type: string
          format: date-time
    SavingsGoalCreateRequest:
      type: object
      required: [name, target_amount, currency]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        target_amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        deadline:
          type: string
          format: date
          nullable: true
        description:
          type: string
          maxLength: 500
    SavingsGoalUpdateRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 120
        target_amount:
          $ref: "#/components/schemas/MoneyAmount"
        deadline:
          type: string
          format: date
          nullable: true
        description:
          type: string
          maxLength: 500
    SavingsGoalContributionRequest:
      type: object
      required: [funding_account_id, amount]
      properties:
        funding_account_id:
          type: string
          format: uuid
        amount:
          $ref: "#/components/schemas/MoneyAmount"
    SavingsGoalReleaseRequest:
      type: object
      required: [destination_account_id, amount]
      properties:
        destination_account_id:
          type: string
          format: uuid
        amount:
          $ref: "#/components/schemas/MoneyAmount"
    SavingsGoalMutationResult:
      type: object
      required: [goal, entry, bank_transaction]
      properties:
        goal:
          $ref: "#/components/schemas/SavingsGoalDetail"
        entry:
          $ref: "#/components/schemas/SavingsGoalEntry"
        bank_transaction:
          $ref: "#/components/schemas/BankTransaction"
    VersionedActionRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version:
          type: integer
        reason:
          type: string
          maxLength: 500
    RecurringLoanTemplateVersion:
      type: object
      required:
        - id
        - version
        - borrower_id
        - description_template
        - principal_amount
        - currency
        - repayment_frequency
        - installment_count
        - recurrence_interval
        - start_date
        - timezone
        - allow_parallel_active_generated_loans
        - created_at
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
        borrower_id:
          type: string
          format: uuid
        description_template:
          type: string
          maxLength: 500
        principal_amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        interest_rate_percent:
          type: string
          nullable: true
        repayment_frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        installment_count:
          type: integer
          minimum: 1
        recurrence_interval:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        max_occurrences:
          type: integer
          minimum: 1
          nullable: true
        timezone:
          type: string
        allow_parallel_active_generated_loans:
          type: boolean
        max_generated_loan_principal_exposure:
          $ref: "#/components/schemas/MoneyAmount"
        created_at:
          type: string
          format: date-time
    RecurringLoanConsent:
      type: object
      required: [template_version_id, decision, decided_by, decided_at]
      properties:
        template_version_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [APPROVED, REJECTED, REVOKED]
        decided_by:
          $ref: "#/components/schemas/UserSummary"
        decided_at:
          type: string
          format: date-time
        reason:
          type: string
          nullable: true
    GeneratedLoanRecord:
      type: object
      required: [id, loan_id, template_version_id, scheduled_for_date, sequence, generated_at]
      properties:
        id:
          type: string
          format: uuid
        loan_id:
          type: string
          format: uuid
        template_version_id:
          type: string
          format: uuid
        scheduled_for_date:
          type: string
          format: date
        sequence:
          type: integer
        generated_at:
          type: string
          format: date-time
    RecurringLoanSummary:
      type: object
      required: [id, borrower, status, recurrence_interval, total_generated, version, created_at]
      properties:
        id:
          type: string
          format: uuid
        borrower:
          $ref: "#/components/schemas/UserSummary"
        status:
          type: string
          enum: [DRAFT, PENDING_APPROVAL, ACTIVE, PAUSED, SUSPENDED, COMPLETED, CANCELLED]
        recurrence_interval:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        next_generation_at:
          type: string
          format: date-time
          nullable: true
        total_generated:
          type: integer
        active_template_version_id:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
    RecurringLoanDetail:
      allOf:
        - $ref: "#/components/schemas/RecurringLoanSummary"
        - type: object
          required: [creditor, latest_template_version]
          properties:
            creditor:
              $ref: "#/components/schemas/UserSummary"
            latest_template_version:
              $ref: "#/components/schemas/RecurringLoanTemplateVersion"
            active_template_version:
              $ref: "#/components/schemas/RecurringLoanTemplateVersion"
            latest_consent:
              $ref: "#/components/schemas/RecurringLoanConsent"
            last_failure_code:
              type: string
              nullable: true
    RecurringLoanCreateRequest:
      type: object
      required:
        - borrower_id
        - description_template
        - principal_amount
        - currency
        - repayment_frequency
        - installment_count
        - recurrence_interval
        - start_date
        - timezone
      properties:
        borrower_id:
          type: string
          format: uuid
        description_template:
          type: string
          maxLength: 500
        principal_amount:
          $ref: "#/components/schemas/MoneyAmount"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        installment_count:
          type: integer
          minimum: 1
        recurrence_interval:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        max_occurrences:
          type: integer
          minimum: 1
          nullable: true
        timezone:
          type: string
        allow_parallel_active_generated_loans:
          type: boolean
          default: false
        max_generated_loan_principal_exposure:
          $ref: "#/components/schemas/MoneyAmount"
    RecurringLoanUpdateRequest:
      type: object
      required: [expected_version]
      properties:
        expected_version:
          type: integer
        description_template:
          type: string
          maxLength: 500
        principal_amount:
          $ref: "#/components/schemas/MoneyAmount"
        interest_rate_percent:
          type: string
        repayment_frequency:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        installment_count:
          type: integer
          minimum: 1
        recurrence_interval:
          type: string
          enum: [WEEKLY, BIWEEKLY, MONTHLY]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        max_occurrences:
          type: integer
          minimum: 1
          nullable: true
        timezone:
          type: string
        allow_parallel_active_generated_loans:
          type: boolean
        max_generated_loan_principal_exposure:
          $ref: "#/components/schemas/MoneyAmount"
paths:
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Create an account and send verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirm_password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                confirm_password:
                  type: string
      responses:
        "201":
          description: Account created
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Login and establish a refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/email-verification/resend:
    post:
      tags: [Auth]
      summary: Resend a verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Request accepted
  /api/v1/auth/email-verification/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Generic success response
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete a password reset and revoke existing sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, confirm_password]
              properties:
                token:
                  type: string
                password:
                  type: string
                confirm_password:
                  type: string
      responses:
        "200":
          description: Password updated
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Rotate refresh session and issue a new access token
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/me:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Get the authenticated user profile
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke the current session
      responses:
        "204":
          description: Logged out
  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke all other sessions for the authenticated user
      responses:
        "204":
          description: Other sessions revoked
  /api/v1/auth/sessions:
    get:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: List active sessions for the authenticated user
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
  /api/v1/auth/sessions/{sessionId}:
    delete:
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CsrfHeader"
      summary: Revoke a specific session
      responses:
        "204":
          description: Session revoked
  /api/v1/users:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: List users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Create a user
      responses:
        "201":
          description: Created
  /api/v1/users/borrowers:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Search the creditor-safe borrower directory
      responses:
        "200":
          description: Matching borrowers
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/BorrowerDirectoryItem"
  /api/v1/users/{userId}:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Get a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummary"
    patch:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Update a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated
  /api/v1/roles:
    get:
      tags: [Roles]
      security:
        - bearerAuth: []
      summary: List roles and permissions
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Role"
  /api/v1/roles/{roleKey}/permissions:
    put:
      tags: [Roles]
      security:
        - bearerAuth: []
      summary: Replace permissions for a role using the controlled catalog
      parameters:
        - in: path
          name: roleKey
          required: true
          schema:
            type: string
            enum: [ADMIN, CREDITOR, BORROWER]
      responses:
        "200":
          description: Updated
  /api/v1/admin/audit-events:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Search administrative audit events
      responses:
        "200":
          description: Audit events
  /api/v1/loans:
    get:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: List loans
      responses:
        "200":
          description: Loan list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/LoanSummary"
    post:
      tags: [Loans]
      security:
        - bearerAuth: []
      summary: Create a loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoanInput"
      responses:
        "201":
          description: Loan created
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/loans/recurring:
    get:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: List recurring loan templates visible to the current actor
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [DRAFT, PENDING_APPROVAL, ACTIVE, PAUSED, SUSPENDED, COMPLETED, CANCELLED]
      responses:
        "200":
          description: Recurring loan list
          content:
            application/json:
              schema:
                type: object
                required: [items, meta]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecurringLoanSummary"
                  meta:
                    $ref: "#/components/schemas/CursorPageMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Create a draft recurring loan template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringLoanCreateRequest"
      responses:
        "201":
          description: Draft recurring loan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/loans/recurring/{recurringId}:
    get:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Get recurring loan detail including approval state and generated history
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      responses:
        "200":
          description: Recurring loan detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Update a draft, paused, or suspended recurring loan template
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringLoanUpdateRequest"
      responses:
        "200":
          description: Recurring loan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/loans/recurring/{recurringId}/submit-for-approval:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Submit the current recurring loan template version for borrower approval
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan moved to pending approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/approve:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Approve and activate the pending recurring loan template
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/reject:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Reject the pending recurring loan template
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/pause:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Pause recurring loan generation
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/resume:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Resume a paused recurring loan
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/cancel:
    post:
      tags: [Recurring Loans]
      security:
        - bearerAuth: []
      summary: Permanently cancel recurring loan generation and revoke future consent
      parameters:
        - $ref: "#/components/parameters/RecurringLoanIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VersionedActionRequest"
      responses:
        "200":
          description: Recurring loan cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringLoanDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/loans/recurring/{recurringId}/generated:
    get:
