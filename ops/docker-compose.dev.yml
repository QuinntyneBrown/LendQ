version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: lendq
      POSTGRES_PASSWORD: lendq
      POSTGRES_DB: lendq_dev
    ports:
      - "5432:5432"
    volumes:
      - lendq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lendq -d lendq_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  lendq_postgres_data:
